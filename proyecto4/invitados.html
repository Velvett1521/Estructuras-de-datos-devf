<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algoritmo de los 2 Punteros - Invitados</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      color: #333;
    }
    .contenedor {
      max-width: 1000px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    .card {
      background-color: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      margin-bottom: 30px;
    }
    .lista-invitados {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 30px;
    }
    h2 {
      color: #4a5568;
      margin-top: 0;
      border-bottom: 3px solid #667eea;
      padding-bottom: 10px;
    }
    .invitados-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    .invitado-item {
      background-color: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: transform 0.3s;
    }
    .invitado-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }
    .inicial {
      background-color: #667eea;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2em;
    }
    .nombre {
      font-size: 1.1em;
      color: #2d3748;
    }
    .resultado-busqueda {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border-radius: 10px;
      padding: 20px;
      color: white;
      margin-bottom: 20px;
    }
    .par-encontrado {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 20px 0;
    }
    .invitado-card {
      background-color: white;
      color: #333;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      min-width: 150px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }
    .invitado-card .inicial-grande {
      background-color: #667eea;
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 2em;
      margin: 0 auto 10px;
    }
    .no-encontrado {
      text-align: center;
      padding: 30px;
      background-color: #fef3c7;
      border-radius: 10px;
      color: #92400e;
      font-size: 1.2em;
    }
    .info-algoritmo {
      background-color: #edf2f7;
      border-radius: 10px;
      padding: 20px;
      margin-top: 30px;
    }
    .pasos {
      background-color: white;
      padding: 15px;
      border-radius: 8px;
      margin: 10px 0;
      font-family: monospace;
    }
    .boton-reiniciar {
      background-color: #48bb78;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      font-size: 1.1em;
      cursor: pointer;
      transition: background-color 0.3s;
      margin-top: 20px;
    }
    .boton-reiniciar:hover {
      background-color: #38a169;
    }
    .ejemplos-adicionales {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .ejemplo-card {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <h1>Algoritmo de los 2 Punteros - Buscando Invitados</h1>
    
    <div class="card">
      <h2>Lista de Invitados (Ordenada Alfabéticamente)</h2>
      <div class="lista-invitados">
        <div class="invitados-grid" id="invitados-grid">
        </div>
      </div>

      <div class="resultado-busqueda" id="resultado-busqueda">
        <h3 style="margin-top: 0; color: white;">Resultado de la Búsqueda</h3>
        <div id="resultado-contenido"></div>
      </div>

      <div class="info-algoritmo">
        <h3>Proceso del Algoritmo de 2 Punteros</h3>
        <div class="pasos" id="proceso-algoritmo">
          <p>Iniciando búsqueda...</p>
        </div>
        
        <div style="text-align: center;">
          <button class="boton-reiniciar" onclick="reiniciarBusqueda()">
            Reiniciar Búsqueda
          </button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Ejemplos Adicionales</h2>
      <div class="ejemplos-adicionales" id="ejemplos-adicionales">
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
